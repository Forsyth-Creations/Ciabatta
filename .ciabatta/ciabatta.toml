# Ciabatta configuration
# Run `ciabatta config reference` for full documentation.

[system]
# ci = "github"  # Uncomment and set: gitlab | github | jenkins | circleci | azure | bitbucket
containers = "docker"

# ─── Registries ────────────────────────────────────────────────────────────────
[registries.nexus]
url        = "http://localhost:8527"   # bare Nexus host
repository = "raw-hosted"              # which repo the artifacts go to
format     = "raw"                     # raw | npm | pypi
# base_path = "builds"                 # optional: prefix prepended to publish_path
tls_verify = false
needs_auth = true

# ─── Recipes ───────────────────────────────────────────────────────────────────
# Build the ciabatta release binary and publish it to the nexus registry.
# Credentials come from CIABATTA_NEXUS_USER / CIABATTA_NEXUS_PASS.
[recipies.ciabatta_binary]
registry            = "nexus"
local_artifact_path = "target/release/ciabatta"
publish_path        = "ciabatta/{CIABATTA_BRANCH}/{CIABATTA_COMMIT}/ciabatta"

[ai]
api_key_env = "OPENAI_API_KEY"
endpoint = "http://localhost:11434"
images = []
model = "llama3.1:8b"
provider = "openai"
tls_verify = true
