name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "package.json"
      - "turbo.json"
      - "yarn.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ciabatta-builder:latest
          # Match the runner's uid/gid so mounted workspace files are writable.
          build-args: |
            USER_UID=1001
            USER_GID=1001
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Build
        run: |
          mkdir -p "$HOME/.cargo/registry"
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v "$HOME/.cargo/registry":/home/dev/.cargo/registry \
            -w /workspace \
            ciabatta-builder \
            bash -c "yarn install --immutable && yarn build"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciabatta-linux-x86_64
          path: target/release/ciabatta

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
