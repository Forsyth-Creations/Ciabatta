<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ciabatta · analyze</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --line: #262b38;
    --muted: #6b7280;
    --text: #e6e8ee;
    --requirement: #a78bfa;
    --external: #f5a524;
    --internal: #38bdf8;
    --publish: #34d399;
    --danger: #f87171;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: baseline; gap: 16px;
    padding: 12px 20px 0;
  }
  header .brand { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
  header .brand .crumb { color: var(--muted); font-weight: 400; }
  header .meta { color: var(--muted); font-size: 12px; }
  header .legend { margin-left: auto; display: flex; gap: 14px; font-size: 12px; }
  .legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }

  .filters {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px 16px;
    padding: 10px 20px; border-bottom: 1px solid var(--line);
  }
  .filters input[type=search], .filters select {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 5px 9px; font: inherit; font-size: 13px;
  }
  .filters input[type=search] { min-width: 180px; }
  .filters .group { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .chip {
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px;
    cursor: pointer; user-select: none; font-size: 12px; color: var(--muted);
    background: var(--panel);
  }
  .chip.on { color: var(--text); border-color: currentColor; }
  .chip.cat-requirement.on { color: var(--requirement); }
  .chip.cat-external.on { color: var(--external); }
  .chip.cat-internal.on { color: var(--internal); }
  .chip.cat-publish.on { color: var(--publish); }
  .chip.eco.on { color: var(--accent); }
  button.linklike {
    background: none; border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 5px 11px; cursor: pointer; font: inherit; font-size: 12px;
  }
  button.linklike:hover { border-color: var(--accent); }

  main { flex: 1; display: flex; min-height: 0; position: relative; }
  #canvas { flex: 1; overflow: auto; }
  svg { display: block; }
  .col-header { fill: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; }
  .edge { fill: none; stroke: var(--line); stroke-width: 1.2; }
  .node { cursor: pointer; }
  .node.dim { opacity: .16; }
  .node text.label { fill: var(--text); font-size: 13px; }
  .node text.sub { fill: var(--muted); font-size: 10.5px; }
  .node text.mark { font-size: 11px; }

  aside {
    width: 330px; border-left: 1px solid var(--line); background: var(--panel);
    padding: 18px 20px; overflow-y: auto;
  }
  aside.empty { color: var(--muted); display: flex; align-items: center; justify-content: center; text-align: center; }
  aside h2 { margin: 0 0 6px; font-size: 17px; word-break: break-all; }
  aside .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  aside .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
  aside dl { margin: 0; display: grid; grid-template-columns: 92px 1fr; gap: 8px 12px; }
  aside dt { color: var(--muted); font-size: 12px; }
  aside dd { margin: 0; word-break: break-all; }
  aside .sec { margin-top: 18px; }
  aside .sec h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 8px; }
  aside ul { margin: 0; padding-left: 18px; }
  aside .vuln { border: 1px solid #3a2326; background: #1c1416; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; }
  aside .vuln a { color: var(--danger); text-decoration: none; font-weight: 600; }
  aside .ok { color: var(--publish); font-size: 12px; }

  /* Files overlay */
  #files {
    position: absolute; inset: 0; background: rgba(8,10,15,.86);
    display: none; align-items: flex-start; justify-content: center; padding: 40px;
  }
  #files.open { display: flex; }
  #files .sheet { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; width: min(900px, 100%); max-height: 100%; overflow: auto; }
  #files .sheet h2 { margin: 0; padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; }
  #files .sheet h2 button { margin-left: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { text-align: left; padding: 8px 14px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--panel); }
  td.ws { color: var(--requirement); }
</style>
</head>
<body>
  <header>
    <div class="brand">🍞 ciabatta <span class="crumb">/ analyze</span></div>
    <div class="meta" id="meta"></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--requirement)"></span>Requirements</span>
      <span><span class="dot" style="background:var(--external)"></span>Dependencies</span>
      <span><span class="dot" style="background:var(--internal)"></span>Internal</span>
      <span><span class="dot" style="background:var(--publish)"></span>Publish</span>
    </div>
  </header>

  <div class="filters">
    <input type="search" id="search" placeholder="Filter by name…" autocomplete="off" />
    <div class="group" id="catFilters">Categories:</div>
    <div class="group" id="ecoFilters">Ecosystem:</div>
    <div class="group">Workspace:
      <select id="wsFilter"><option value="all">all</option></select>
    </div>
    <button class="linklike" id="filesBtn">Files</button>
    <button class="linklike" id="resetBtn">Reset</button>
  </div>

  <main>
    <div id="canvas"><svg id="svg"></svg></div>
    <aside id="panel" class="empty">Select a node to inspect it.</aside>
    <div id="files"><div class="sheet">
      <h2>Workspace files <button class="linklike" id="filesClose">Close</button></h2>
      <div id="filesBody"></div>
    </div></div>
  </main>

<script>
const SVGNS = "http://www.w3.org/2000/svg";
const COLS = [
  { cat: "requirement", title: "Requirements" },
  { cat: "external",    title: "Dependencies" },
  { cat: "internal",    title: "Internal" },
  { cat: "publish",     title: "Publish" },
];
const NODE_W = 188, NODE_H = 40, ROW_GAP = 13, COL_GAP = 130, MARGIN_X = 36, TOP = 64;

let GRAPH = null;
let SELECTED = null;
const filters = { search: "", cats: new Set(), ecos: new Set(), ws: "all" };

function el(name, attrs = {}, parent) {
  const e = document.createElementNS(SVGNS, name);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}
function trim(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }
function escape(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

fetch("graph.json").then(r => r.json()).then(init).catch(err => {
  document.getElementById("meta").textContent = "failed to load graph: " + err;
});

function init(graph) {
  GRAPH = graph;
  const counts = {};
  graph.nodes.forEach(n => counts[n.category] = (counts[n.category] || 0) + 1);
  document.getElementById("meta").textContent =
    `${graph.root} · ${graph.nodes.length} nodes · ${graph.edges.length} edges · ${(graph.files||[]).length} files` +
    (graph.generated_at ? ` · ${graph.generated_at.slice(0, 19).replace("T", " ")}` : "");

  // Precompute, for each node, the workspaces it's associated with (internal
  // packages by their own workspace; everything else via connected packages).
  graph._nodeById = new Map(graph.nodes.map(n => [n.id, n]));
  const nodeWs = new Map(graph.nodes.map(n => [n.id, new Set()]));
  graph.nodes.forEach(n => { if (n.workspace) nodeWs.get(n.id).add(n.workspace); });
  graph.edges.forEach(e => {
    const a = graph._nodeById.get(e.from), b = graph._nodeById.get(e.to);
    if (a && a.category === "internal" && a.workspace) nodeWs.get(e.to)?.add(a.workspace);
    if (b && b.category === "internal" && b.workspace) nodeWs.get(e.from)?.add(b.workspace);
  });
  graph._nodeWs = nodeWs;

  // Category chips.
  const catBox = document.getElementById("catFilters");
  COLS.forEach(c => {
    if (!counts[c.cat]) return;
    filters.cats.add(c.cat);
    const chip = document.createElement("span");
    chip.className = `chip cat-${c.cat} on`;
    chip.textContent = c.title;
    chip.onclick = () => { toggle(filters.cats, c.cat); chip.classList.toggle("on"); render(); };
    catBox.appendChild(chip);
  });

  // Ecosystem chips.
  const ecoBox = document.getElementById("ecoFilters");
  [...new Set(graph.nodes.map(n => n.ecosystem).filter(Boolean))].sort().forEach(eco => {
    filters.ecos.add(eco);
    const chip = document.createElement("span");
    chip.className = "chip eco on";
    chip.textContent = eco;
    chip.onclick = () => { toggle(filters.ecos, eco); chip.classList.toggle("on"); render(); };
    ecoBox.appendChild(chip);
  });

  // Workspace dropdown.
  const wsSel = document.getElementById("wsFilter");
  graph.nodes.filter(n => n.is_workspace).forEach(n => {
    const o = document.createElement("option");
    o.value = n.workspace; o.textContent = n.label;
    wsSel.appendChild(o);
  });
  wsSel.onchange = () => { filters.ws = wsSel.value; render(); };

  document.getElementById("search").oninput = e => { filters.search = e.target.value.toLowerCase(); render(); };
  document.getElementById("resetBtn").onclick = resetFilters;
  document.getElementById("filesBtn").onclick = () => showFiles(graph);
  document.getElementById("filesClose").onclick = () => document.getElementById("files").classList.remove("open");

  render();
}

function toggle(set, v) { set.has(v) ? set.delete(v) : set.add(v); }

function resetFilters() {
  filters.search = ""; filters.ws = "all";
  document.getElementById("search").value = "";
  document.getElementById("wsFilter").value = "all";
  document.querySelectorAll(".chip.cat-requirement,.chip.cat-external,.chip.cat-internal,.chip.cat-publish")
    .forEach(c => { c.classList.add("on"); });
  document.querySelectorAll(".chip.eco").forEach(c => c.classList.add("on"));
  COLS.forEach(c => filters.cats.add(c.cat));
  [...new Set(GRAPH.nodes.map(n => n.ecosystem).filter(Boolean))].forEach(e => filters.ecos.add(e));
  render();
}

function visible(n) {
  if (!filters.cats.has(n.category)) return false;
  if (n.ecosystem && !filters.ecos.has(n.ecosystem)) return false;
  if (filters.search && !n.label.toLowerCase().includes(filters.search)) return false;
  if (filters.ws !== "all") {
    const ws = GRAPH._nodeWs.get(n.id);
    const inWs = (ws && ws.has(filters.ws)) || n.id === filters.ws;
    if (!inWs) return false;
  }
  return true;
}

function render() {
  const graph = GRAPH;
  const vis = new Set(graph.nodes.filter(visible).map(n => n.id));

  const activeCols = COLS.filter(c => graph.nodes.some(n => n.category === c.cat && vis.has(n.id)));
  const colIndex = new Map(activeCols.map((c, i) => [c.cat, i]));

  const pos = new Map();
  activeCols.forEach((col, ci) => {
    const x = MARGIN_X + ci * (NODE_W + COL_GAP);
    graph.nodes.filter(n => n.category === col.cat && vis.has(n.id))
      .sort((a, b) => a.label.localeCompare(b.label))
      .forEach((n, i) => pos.set(n.id, { x, y: TOP + i * (NODE_H + ROW_GAP), node: n, col: ci }));
  });

  const rows = activeCols.map(c => graph.nodes.filter(n => n.category === c.cat && vis.has(n.id)).length);
  const maxRows = Math.max(...rows, 1);
  const width = MARGIN_X * 2 + Math.max(activeCols.length, 1) * NODE_W + Math.max(activeCols.length - 1, 0) * COL_GAP;
  const height = TOP + maxRows * (NODE_H + ROW_GAP) + 24;

  const svg = document.getElementById("svg");
  svg.setAttribute("width", width);
  svg.setAttribute("height", height);
  svg.innerHTML = "";

  activeCols.forEach((col, ci) => {
    const t = el("text", { x: MARGIN_X + ci * (NODE_W + COL_GAP), y: 38, class: "col-header" }, svg);
    t.textContent = col.title;
  });

  const edgeEls = [];
  graph.edges.forEach(e => {
    const a = pos.get(e.from), b = pos.get(e.to);
    if (!a || !b) return;
    const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2, x2 = b.x, y2 = b.y + NODE_H / 2;
    let d;
    if (a.col === b.col) {
      const bow = 36;
      d = `M ${a.x} ${y1} C ${a.x - bow} ${y1}, ${b.x - bow} ${y2}, ${b.x} ${y2}`;
    } else {
      const mx = (x1 + x2) / 2;
      d = `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    }
    edgeEls.push({ path: el("path", { d, class: "edge" }, svg), from: e.from, to: e.to });
  });

  const nodeEls = new Map();
  pos.forEach(({ x, y, node }) => {
    const g = el("g", { class: "node" }, svg);
    const color = `var(--${node.category})`;
    el("rect", { x, y, width: NODE_W, height: NODE_H, fill: "var(--panel)", stroke: color, "stroke-width": 1.5, rx: 7 }, g);
    el("rect", { x, y, width: 4, height: NODE_H, fill: color, rx: 2 }, g);
    const label = el("text", { x: x + 13, y: y + 16, class: "label" }, g);
    label.textContent = trim(node.label, 21);
    const sub = el("text", { x: x + 13, y: y + 30, class: "sub" }, g);
    sub.textContent = [node.ecosystem, node.version].filter(Boolean).join(" · ");
    // Corner marks: workspace ⬡, ciabatta-managed 🍞, vulnerabilities ●.
    const marks = [];
    if (node.is_workspace) marks.push(["⬡", "var(--internal)"]);
    if (node.ciabatta_managed) marks.push(["🍞", "var(--publish)"]);
    if (node.vulnerabilities && node.vulnerabilities.length) marks.push(["●", "var(--danger)"]);
    marks.forEach((m, i) => {
      const t = el("text", { x: x + NODE_W - 10 - i * 13, y: y + 14, class: "mark", "text-anchor": "middle", fill: m[1] }, g);
      t.textContent = m[0];
    });
    g.addEventListener("click", () => select(node.id, edgeEls, nodeEls));
    nodeEls.set(node.id, g);
  });

  // Re-apply selection highlight if the selected node is still visible.
  if (SELECTED && nodeEls.has(SELECTED)) select(SELECTED, edgeEls, nodeEls);
}

function select(id, edgeEls, nodeEls) {
  SELECTED = id;
  const neighbors = new Set([id]);
  edgeEls.forEach(({ path, from, to }) => {
    const lit = from === id || to === id;
    path.setAttribute("stroke", lit ? "var(--accent)" : "var(--line)");
    path.setAttribute("stroke-width", lit ? 2 : 1.2);
    if (lit) { neighbors.add(from); neighbors.add(to); }
  });
  nodeEls.forEach((g, nid) => g.classList.toggle("dim", !neighbors.has(nid)));
  showPanel(GRAPH._nodeById.get(id));
}

function showPanel(n) {
  if (!n) return;
  const panel = document.getElementById("panel");
  panel.classList.remove("empty");
  const color = `var(--${n.category})`;

  const tags = [`<span class="tag" style="background:${color}22;color:${color}">${n.category}</span>`];
  if (n.is_workspace) tags.push(`<span class="tag" style="background:#38bdf822;color:var(--internal)">workspace root</span>`);
  if (n.ciabatta_managed) tags.push(`<span class="tag" style="background:#34d39922;color:var(--publish)">🍞 managed by ciabatta</span>`);

  const rows = [
    ["ecosystem", n.ecosystem],
    ["version", n.version],
    ["license", n.license],
    ["workspace", n.workspace && GRAPH._nodeById.get(n.workspace)?.label],
    ["source", n.source],
  ].filter(([, v]) => v);

  let html = `<h2>${escape(n.label)}</h2><div class="tags">${tags.join("")}</div>`;
  if (n.description) html += `<p>${escape(n.description)}</p>`;
  html += `<dl>` + rows.map(([k, v]) => `<dt>${k}</dt><dd>${escape(v)}</dd>`).join("") + `</dl>`;

  if (n.traced_files && n.traced_files.length) {
    html += `<div class="sec"><h3>Traced files</h3><ul>` +
      n.traced_files.map(f => `<li>${escape(f)}</li>`).join("") + `</ul></div>`;
  }

  if (n.vulnerabilities && n.vulnerabilities.length) {
    html += `<div class="sec"><h3 style="color:var(--danger)">${n.vulnerabilities.length} known vulnerabilit${n.vulnerabilities.length === 1 ? "y" : "ies"}</h3>`;
    html += n.vulnerabilities.map(v =>
      `<div class="vuln"><a href="https://osv.dev/${encodeURIComponent(v.id)}" target="_blank" rel="noopener">${escape(v.id)}</a>` +
      (v.summary ? `<div>${escape(v.summary)}</div>` : "") + `</div>`).join("");
    html += `</div>`;
  } else if (n.category === "external") {
    html += `<div class="sec"><span class="ok">No known vulnerabilities (run analyze with --check-vulns).</span></div>`;
  }
  panel.innerHTML = html;
}

function showFiles(graph) {
  const files = (graph.files || []).slice().sort((a, b) => a.path.localeCompare(b.path));
  const rowsHtml = files.map(f => `<tr>
    <td>${escape(f.path)}</td>
    <td>${escape(f.kind)}</td>
    <td>${escape(f.ecosystem)}</td>
    <td>${f.bytes} B</td>
    <td>${escape(f.package ? (graph._nodeById.get(f.package)?.label || f.package) : "—")}</td>
    <td class="ws">${(f.workspace_members && f.workspace_members.length) ? escape(f.workspace_members.join(", ")) : ""}</td>
  </tr>`).join("");
  document.getElementById("filesBody").innerHTML = `<table>
    <thead><tr><th>path</th><th>kind</th><th>ecosystem</th><th>size</th><th>package</th><th>workspace members</th></tr></thead>
    <tbody>${rowsHtml}</tbody></table>`;
  document.getElementById("files").classList.add("open");
}
</script>
</body>
</html>
