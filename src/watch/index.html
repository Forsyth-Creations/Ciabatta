<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ciabatta — Watch</title>
    <style>
      :root {
        --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
        --fg: #e6e9ef; --muted: #9aa4b2; --accent: #f0a54a;
        --stdout: #cdd3dc; --stderr: #ef8f97; --running: #4aa3f0;
        --success: #46c17a; --failed: #ef5f6b; --mark: #f0a54a;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; background: var(--bg); color: var(--fg); height: 100vh;
        display: flex; flex-direction: column;
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      header {
        padding: 12px 20px; border-bottom: 1px solid var(--line);
        display: flex; align-items: center; gap: 12px; flex: none;
      }
      header .loaf { font-size: 20px; }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; white-space: nowrap; }
      header .cmd {
        font: 12.5px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--muted); background: var(--panel2); padding: 3px 8px;
        border-radius: 6px; border: 1px solid var(--line);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 46vw;
      }
      header .spacer { margin-left: auto; }
      .pill {
        display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
        padding: 3px 10px; border-radius: 999px; border: 1px solid var(--line);
        background: var(--panel2); color: var(--muted); white-space: nowrap;
      }
      .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
      .pill.running { color: var(--running); border-color: rgba(74,163,240,.4); }
      .pill.running .dot { background: var(--running); animation: pulse 1.2s infinite; }
      .pill.success { color: var(--success); border-color: rgba(70,193,122,.4); }
      .pill.success .dot { background: var(--success); }
      .pill.failed { color: var(--failed); border-color: rgba(239,95,107,.5); }
      .pill.failed .dot { background: var(--failed); }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

      .searchbar {
        display: flex; align-items: center; gap: 8px; padding: 10px 20px;
        border-bottom: 1px solid var(--line); flex: none; flex-wrap: wrap;
      }
      .searchbar input[type=text] {
        flex: 1 1 260px; min-width: 180px; background: var(--panel2); color: var(--fg);
        border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; font: inherit;
      }
      .searchbar input[type=text]:focus { outline: none; border-color: var(--accent); }
      .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      .seg button {
        background: var(--panel2); color: var(--muted); border: none; padding: 6px 10px;
        font: inherit; font-size: 12.5px; cursor: pointer;
      }
      .seg button.on { background: rgba(240,165,74,.15); color: var(--accent); }
      .chk { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: 12.5px; cursor: pointer; }
      .btn {
        background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
        border-radius: 8px; padding: 6px 12px; font: inherit; font-size: 12.5px; cursor: pointer;
      }
      .btn:hover { border-color: var(--accent); }
      .btn.primary { background: rgba(240,165,74,.15); color: var(--accent); border-color: rgba(240,165,74,.4); }
      .searchmeta { color: var(--muted); font-size: 12.5px; }

      main { flex: 1 1 auto; display: grid; grid-template-columns: 1fr 320px; min-height: 0; }
      @media (max-width: 860px) { main { grid-template-columns: 1fr; } aside { display: none; } }

      .logwrap { min-width: 0; display: flex; flex-direction: column; min-height: 0; }
      .logbar {
        display: flex; align-items: center; gap: 12px; padding: 6px 20px; color: var(--muted);
        border-bottom: 1px solid var(--line); font-size: 12.5px; flex: none;
      }
      .logbar .spacer { margin-left: auto; }
      #log {
        flex: 1 1 auto; overflow: auto; padding: 8px 0;
        font: 12.5px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .row {
        display: flex; gap: 10px; padding: 1px 20px; white-space: pre-wrap; word-break: break-word;
      }
      .row:hover { background: var(--panel); }
      .row .seq { color: #5b6472; flex: none; text-align: right; width: 56px; user-select: none; }
      .row .ts { color: #5b6472; flex: none; display: none; }
      body.show-ts .row .ts { display: inline; }
      .row .txt { flex: 1 1 auto; color: var(--stdout); }
      .row.stderr .txt { color: var(--stderr); }
      .row .star {
        flex: none; visibility: hidden; cursor: pointer; color: var(--muted);
        background: none; border: none; font-size: 13px; padding: 0 2px;
      }
      .row:hover .star { visibility: visible; }
      .row .star:hover { color: var(--accent); }
      .row.flash { background: rgba(240,165,74,.18); }
      mark { background: rgba(240,165,74,.28); color: var(--fg); border-radius: 2px; }
      .placeholder { color: var(--muted); padding: 40px 20px; text-align: center; }

      aside {
        border-left: 1px solid var(--line); background: var(--panel); overflow: auto;
        display: flex; flex-direction: column;
      }
      .sect { border-bottom: 1px solid var(--line); padding: 12px 14px; }
      .sect h2 {
        font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
        margin: 0 0 10px; display: flex; align-items: center; gap: 6px;
      }
      .sect h2 .count { color: var(--accent); }
      .item {
        display: flex; align-items: flex-start; gap: 8px; padding: 6px 8px; border-radius: 6px;
        border: 1px solid transparent;
      }
      .item:hover { background: var(--panel2); border-color: var(--line); }
      .item .grow { flex: 1 1 auto; min-width: 0; }
      .item .title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .item .sub {
        font: 11.5px/1.4 ui-monospace, Menlo, monospace; color: var(--muted);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .item.clickable { cursor: pointer; }
      .item .x { flex: none; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
      .item .x:hover { color: var(--failed); }
      .hitcount {
        font-size: 11px; padding: 1px 7px; border-radius: 999px; flex: none;
        background: rgba(240,165,74,.15); color: var(--accent);
      }
      .addrow { display: flex; gap: 6px; margin-top: 8px; }
      .addrow input[type=text] {
        flex: 1 1 auto; min-width: 0; background: var(--panel2); color: var(--fg);
        border: 1px solid var(--line); border-radius: 6px; padding: 5px 8px; font: inherit; font-size: 12.5px;
      }
      .addrow input:focus { outline: none; border-color: var(--accent); }
      .muted { color: var(--muted); font-size: 12.5px; }

      #toasts { position: fixed; right: 16px; bottom: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
      .toast {
        background: var(--panel2); border: 1px solid rgba(240,165,74,.5); border-left-width: 3px;
        border-radius: 8px; padding: 10px 14px; max-width: 360px; box-shadow: 0 6px 20px rgba(0,0,0,.4);
        animation: slidein .18s ease-out;
      }
      .toast .t-title { color: var(--accent); font-size: 12px; font-weight: 600; margin-bottom: 3px; }
      .toast .t-body { font: 12px/1.4 ui-monospace, Menlo, monospace; color: var(--fg); word-break: break-word; }
      @keyframes slidein { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
    </style>
  </head>
  <body>
    <header>
      <span class="loaf">🍞</span>
      <h1>ciabatta watch</h1>
      <span class="cmd" id="cmd" title=""></span>
      <span class="spacer"></span>
      <span class="pill" id="status"><span class="dot"></span><span id="statusText">connecting…</span></span>
      <span class="pill" id="counts"><span id="countText">0 lines</span></span>
    </header>

    <div class="searchbar">
      <input type="text" id="q" placeholder="Search terms (comma or space separated)…" autocomplete="off" />
      <div class="seg" id="modeSeg">
        <button data-mode="any" class="on">any</button>
        <button data-mode="all">all</button>
      </div>
      <div class="seg" id="streamSeg">
        <button data-stream="all" class="on">all</button>
        <button data-stream="stdout">stdout</button>
        <button data-stream="stderr">stderr</button>
      </div>
      <label class="chk"><input type="checkbox" id="regex" /> regex</label>
      <button class="btn primary" id="searchBtn">Search</button>
      <button class="btn" id="clearBtn" hidden>Clear · live</button>
      <span class="searchmeta" id="searchMeta"></span>
    </div>

    <main>
      <div class="logwrap">
        <div class="logbar">
          <label class="chk"><input type="checkbox" id="follow" checked /> follow tail</label>
          <label class="chk"><input type="checkbox" id="tsToggle" /> timestamps</label>
          <span class="spacer"></span>
          <span id="viewMode">live</span>
        </div>
        <div id="log"><div class="placeholder">Waiting for output…</div></div>
      </div>

      <aside>
        <div class="sect">
          <h2>🔔 Triggers <span class="count" id="trigCount"></span></h2>
          <div id="triggers"></div>
          <div class="addrow">
            <input type="text" id="trigInput" placeholder="phrase or /regex/" autocomplete="off" />
            <label class="chk"><input type="checkbox" id="trigRegex" /> re</label>
            <button class="btn" id="trigAdd">Add</button>
          </div>
          <div class="muted" id="notifHint" style="margin-top:8px"></div>
        </div>
        <div class="sect">
          <h2>★ Bookmarks <span class="count" id="bmCount"></span></h2>
          <div id="bookmarks"><div class="muted">Hover a line and click ★ to save a point.</div></div>
        </div>
        <div class="sect">
          <h2>⚑ Recent hits <span class="count" id="hitCount"></span></h2>
          <div id="hits"><div class="muted">No trigger matches yet.</div></div>
        </div>
      </aside>
    </main>

    <div id="toasts"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));

      let lastSeq = 0;
      let mode = "any", streamFilter = "all";
      let searching = false;          // showing search results instead of live tail
      let searchTerms = [];
      let seenHits = new Set();       // trigger_id:seq keys already notified
      let firstPoll = true;

      // ── notifications ──────────────────────────────────────────────────────
      let audioCtx = null;
      function ping() {
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.frequency.value = 880; o.type = "sine";
          g.gain.setValueAtTime(0.06, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
          o.connect(g); g.connect(audioCtx.destination);
          o.start(); o.stop(audioCtx.currentTime + 0.25);
        } catch (e) {}
      }
      function ensureNotifyPermission() {
        if (!("Notification" in window)) return;
        if (Notification.permission === "default") Notification.requestPermission().then(updateNotifHint);
      }
      function updateNotifHint() {
        const el = $("notifHint");
        if (!("Notification" in window)) { el.textContent = "Desktop notifications unavailable in this browser."; return; }
        if (Notification.permission === "granted") el.textContent = "Desktop notifications on.";
        else if (Notification.permission === "denied") el.textContent = "Desktop notifications blocked; toasts + sound still fire.";
        else el.textContent = "Add a trigger to enable desktop notifications.";
      }
      function notify(pattern, text) {
        toast(pattern, text);
        ping();
        if ("Notification" in window && Notification.permission === "granted") {
          try { new Notification("⚑ " + pattern, { body: text }); } catch (e) {}
        }
      }
      function toast(pattern, text) {
        const t = document.createElement("div");
        t.className = "toast";
        t.innerHTML = `<div class="t-title">⚑ ${esc(pattern)}</div><div class="t-body">${esc(text)}</div>`;
        $("toasts").appendChild(t);
        setTimeout(() => t.remove(), 6000);
      }

      // ── rendering log rows ─────────────────────────────────────────────────
      function rowHtml(l, terms) {
        let txt = esc(l.text);
        if (terms && terms.length) {
          for (const term of terms) {
            try {
              const re = new RegExp("(" + term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
              txt = txt.replace(re, "<mark>$1</mark>");
            } catch (e) {}
          }
        }
        const ts = l.ts ? l.ts.replace("T", " ").slice(0, 19) : "";
        return `<div class="row ${l.stream}" id="line-${l.seq}" data-seq="${l.seq}">`
          + `<span class="seq">${l.seq}</span>`
          + `<span class="ts">${ts}</span>`
          + `<button class="star" title="Bookmark this line" onclick="bookmark(${l.seq})">★</button>`
          + `<span class="txt">${txt}</span></div>`;
      }

      const MAX_DOM_LINES = 2000;
      function appendLines(lines) {
        const log = $("log");
        const ph = log.querySelector(".placeholder");
        if (ph) ph.remove();
        const html = lines.map((l) => rowHtml(l)).join("");
        log.insertAdjacentHTML("beforeend", html);
        while (log.children.length > MAX_DOM_LINES) log.removeChild(log.firstChild);
        if ($("follow").checked) log.scrollTop = log.scrollHeight;
      }

      // ── polling live state ─────────────────────────────────────────────────
      async function poll() {
        try {
          const r = await fetch(`/state.json?after=${lastSeq}&limit=5000`);
          const s = await r.json();
          renderStatus(s);
          renderTriggers(s.triggers || []);
          renderBookmarks(s.bookmarks || []);
          renderHits(s.hits || []);
          fireNewHits(s.hits || [], s.triggers || []);
          if (s.lines && s.lines.length) {
            lastSeq = s.lines[s.lines.length - 1].seq;
            if (!searching) appendLines(s.lines);
          }
          firstPoll = false;
        } catch (e) { /* server going away; keep trying */ }
      }

      function renderStatus(s) {
        $("cmd").textContent = s.command; $("cmd").title = s.command;
        const pill = $("status"), txt = $("statusText");
        pill.className = "pill";
        const st = s.status || {};
        if (st.kind === "running") { pill.classList.add("running"); txt.textContent = "running"; }
        else if (st.kind === "exited") {
          pill.classList.add(st.code === 0 ? "success" : "failed");
          txt.textContent = "exited " + st.code;
        } else if (st.kind === "signaled") { pill.classList.add("failed"); txt.textContent = "signaled"; }
        else if (st.kind === "failed") { pill.classList.add("failed"); txt.textContent = "failed"; }
        const buffered = s.buffered_lines || 0, total = s.total_lines || 0;
        $("countText").textContent = total === buffered
          ? `${total} lines` : `${total} lines (${buffered} buffered)`;
      }

      function fireNewHits(hits, triggers) {
        const pat = {}; for (const t of triggers) pat[t.id] = t.pattern;
        for (const h of hits) {
          const key = h.trigger_id + ":" + h.seq;
          if (seenHits.has(key)) continue;
          seenHits.add(key);
          if (!firstPoll) notify(pat[h.trigger_id] || "trigger", h.text);
        }
      }

      // ── sidebar renderers ──────────────────────────────────────────────────
      function renderTriggers(triggers) {
        $("trigCount").textContent = triggers.length ? triggers.length : "";
        const el = $("triggers");
        if (!triggers.length) { el.innerHTML = '<div class="muted">No triggers. Add one below.</div>'; return; }
        el.innerHTML = triggers.map((t) =>
          `<div class="item"><div class="grow"><div class="title">${esc(t.pattern)}</div>`
          + `<div class="sub">${t.is_regex ? "regex" : "phrase"}</div></div>`
          + `<span class="hitcount">${t.hits}</span>`
          + `<button class="x" title="Remove" onclick="delTrigger(${t.id})">×</button></div>`
        ).join("");
      }
      function renderBookmarks(bms) {
        $("bmCount").textContent = bms.length ? bms.length : "";
        const el = $("bookmarks");
        if (!bms.length) { el.innerHTML = '<div class="muted">Hover a line and click ★ to save a point.</div>'; return; }
        el.innerHTML = bms.map((b) =>
          `<div class="item clickable" onclick="jumpTo(${b.seq}, ${JSON.stringify(b.snippet).replace(/"/g,'&quot;')})">`
          + `<div class="grow"><div class="title">★ ${esc(b.label)}</div>`
          + `<div class="sub">#${b.seq} · ${esc(b.snippet).slice(0,80)}</div></div>`
          + `<button class="x" title="Remove" onclick="event.stopPropagation(); delBookmark(${b.id})">×</button></div>`
        ).join("");
      }
      function renderHits(hits) {
        $("hitCount").textContent = hits.length ? hits.length : "";
        const el = $("hits");
        if (!hits.length) { el.innerHTML = '<div class="muted">No trigger matches yet.</div>'; return; }
        el.innerHTML = hits.slice(-30).reverse().map((h) =>
          `<div class="item clickable" onclick="jumpTo(${h.seq}, ${JSON.stringify(h.text).replace(/"/g,'&quot;')})">`
          + `<div class="grow"><div class="sub">#${h.seq}</div><div class="title" style="font-size:12px">${esc(h.text).slice(0,90)}</div></div></div>`
        ).join("");
      }

      // ── actions ────────────────────────────────────────────────────────────
      async function bookmark(seq) {
        const label = prompt("Bookmark label:", "line " + seq);
        if (label === null) return;
        await fetch("/bookmarks", { method: "POST", body: JSON.stringify({ seq, label }) });
        poll();
      }
      async function delBookmark(id) {
        await fetch("/bookmarks/delete", { method: "POST", body: JSON.stringify({ id }) });
        poll();
      }
      async function delTrigger(id) {
        await fetch("/triggers/delete", { method: "POST", body: JSON.stringify({ id }) });
        poll();
      }
      $("trigAdd").onclick = addTrigger;
      $("trigInput").addEventListener("keydown", (e) => { if (e.key === "Enter") addTrigger(); });
      async function addTrigger() {
        const pattern = $("trigInput").value.trim();
        if (!pattern) return;
        const is_regex = $("trigRegex").checked;
        const r = await fetch("/triggers", { method: "POST", body: JSON.stringify({ pattern, is_regex }) });
        if (!r.ok) { alert("Invalid trigger: " + (await r.text())); return; }
        $("trigInput").value = "";
        ensureNotifyPermission();
        poll();
      }

      function jumpTo(seq, snippet) {
        if (searching) clearSearch();
        const row = document.getElementById("line-" + seq);
        if (row) {
          row.scrollIntoView({ block: "center", behavior: "smooth" });
          row.classList.add("flash");
          setTimeout(() => row.classList.remove("flash"), 1600);
        } else {
          toast("bookmark #" + seq, snippet || "(line scrolled out of the live buffer)");
        }
      }

      // ── search ─────────────────────────────────────────────────────────────
      $("modeSeg").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        mode = b.dataset.mode;
        [...$("modeSeg").children].forEach((c) => c.classList.toggle("on", c === b));
      });
      $("streamSeg").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        streamFilter = b.dataset.stream;
        [...$("streamSeg").children].forEach((c) => c.classList.toggle("on", c === b));
      });
      $("searchBtn").onclick = runSearch;
      $("q").addEventListener("keydown", (e) => { if (e.key === "Enter") runSearch(); });
      $("clearBtn").onclick = clearSearch;

      async function runSearch() {
        const q = $("q").value.trim();
        if (!q) { clearSearch(); return; }
        const regex = $("regex").checked ? "1" : "0";
        const url = `/search?q=${encodeURIComponent(q)}&mode=${mode}&stream=${streamFilter}&regex=${regex}`;
        const s = await (await fetch(url)).json();
        searching = true;
        searchTerms = regex === "1" ? [] : q.split(/[, ]+/).filter(Boolean);
        $("clearBtn").hidden = false;
        $("viewMode").textContent = "search results";
        $("searchMeta").textContent = s.total + " match" + (s.total === 1 ? "" : "es")
          + (s.capped ? " (showing first " + s.lines.length + ")" : "");
        const log = $("log");
        log.innerHTML = s.lines.length
          ? s.lines.map((l) => rowHtml(l, searchTerms)).join("")
          : '<div class="placeholder">No matching lines.</div>';
      }
      function clearSearch() {
        searching = false; searchTerms = [];
        $("clearBtn").hidden = true;
        $("viewMode").textContent = "live";
        $("searchMeta").textContent = "";
        $("q").value = "";
        // Rebuild the live tail from scratch on the next poll.
        lastSeq = 0; seenHits.clear(); firstPoll = true;
        $("log").innerHTML = '<div class="placeholder">Loading…</div>';
      }

      $("tsToggle").addEventListener("change", (e) => document.body.classList.toggle("show-ts", e.target.checked));

      updateNotifHint();
      poll();
      setInterval(poll, 750);
    </script>
  </body>
</html>
