name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cargo.toml is the source of truth for the version. Bump it in the release
  # commit before tagging; this job guards against tagging a stale version.
  verify:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Cargo.toml version == tag
        run: |
          CARGO_VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Tag version:        $TAG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION. Bump Cargo.toml before tagging."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux builds target musl so the binaries are fully static with no
          # glibc dependency -- they run on any Linux distro, old or new.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: ciabatta
            archive: ciabatta-linux-x86_64.tar.gz
            use_cross: true

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: ciabatta
            archive: ciabatta-linux-aarch64.tar.gz
            use_cross: true

          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: ciabatta
            archive: ciabatta-macos-x86_64.tar.gz

          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: ciabatta
            archive: ciabatta-macos-aarch64.tar.gz

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: ciabatta.exe
            archive: ciabatta-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} .
          tar czf ${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.artifact }} .
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
